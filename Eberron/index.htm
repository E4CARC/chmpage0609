<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
  <style>
    /* 🛠️ 视觉净化：干掉所有现代博客/文档库的花哨视觉元素 */
    body { background-color: #fff !important; }
    .markdown-section { max-width: 100% !important; padding: 0 !important; } /* 让原网页内容100%撑满右侧，不要留白 */
    .content { padding-top: 0 !important; top: 0 !important; }
    iframe { border: none; width: 100%; height: 100vh; }
    
    /* 目录树美化：支持原本 HHC 导出的多级嵌套缩进 */
    .sidebar-nav ul ul { padding-left: 18px !important; }
    .sidebar { background-color: #fcfcfc !important; border-right: 1px solid #eee; }
  </style>
</head>
<body>
  <div id="app">正在载入...</div>
  <script>
window.$docsify = {
    name: '艾伯伦5E不全书',
    loadSidebar: true, // 开启侧边栏
    // ⬇️ 删掉了 basePath，让它直接在当前根目录下寻找 _sidebar.md
    alias: {
      '/.*/_sidebar.md': '/_sidebar.md',
    },
    homepage: '0-CHM第一页.htm', // 保持你刚刚对齐成功的 .htm 后缀

  }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
