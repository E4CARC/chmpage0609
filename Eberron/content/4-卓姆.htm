mso-bidi-language:AR">从终<span class="GramE">末战争</span>中崛起的诸多新国度中，卓<span class="GramE">姆</span>既是最年轻的，也是最具以异域风情的。这是个通常被视为怪物的生灵们所组成的同盟，就是被那些从故事里走出的大坏蛋所建立的。这儿不被《王座条约》承认，卓<span class="GramE">姆</span>至今依旧像是一个谜。这个国家是如何形成的，又因为什么吸引着冒险家前来</span><span lang="EN-US" style="mso-bidi-language:AR">?<o:p></o:p></span></p>
